# Local-dev variant of /etc/aipanel/aipanel.conf.
# Pointed at the docker-compose services in dev/docker-compose.yml.
# Secrets come from dev/secrets.dev.env (loaded via AIPANEL_SECRETS).

[database]
host = "127.0.0.1"
port = 5432
name = "aipanel"
user = "aipanel"
pool_min = 1
pool_max = 5

[redis]
host = "127.0.0.1"
port = 6379
db = 0

[minio]
endpoint = "127.0.0.1:9000"
console_endpoint = "127.0.0.1:9001"
secure = false
bucket_recordings = "aipanel-recordings"
bucket_transcripts = "aipanel-transcripts"
bucket_kb = "aipanel-kb"
bucket_voices = "aipanel-voices"

[sip]
listen_host = "0.0.0.0"
listen_port = 5060
public_ip = "127.0.0.1"
rtp_port_min = 16384
rtp_port_max = 32767

[llm]
provider = "vllm"
endpoint = "http://127.0.0.1:8001/v1"
model = "Qwen/Qwen2.5-14B-Instruct-AWQ"
max_tokens = 512
temperature = 0.4
request_timeout_sec = 30
listen_host = "127.0.0.1"
listen_port = 8001
internal_port = 8011
gpu_memory_utilization = 0.6
max_model_len = 8192
tensor_parallel_size = 1
enable_auto_tool_choice = true
tool_call_parser = "hermes"

[stt]
provider = "faster-whisper"
endpoint = "http://127.0.0.1:8002"
model = "large-v3"
language = "en"
vad_threshold = 0.5
listen_host = "127.0.0.1"
listen_port = 8002
device = "cpu"
compute_type = "int8"
beam_size = 5
beam_size_partial = 1
partial_interval_ms = 300

[embed]
endpoint = "http://127.0.0.1:8004"
model    = "BAAI/bge-m3"

[tts]
provider = "f5"
endpoint = "http://127.0.0.1:8003"
default_voice_id = ""
sample_rate = 24000
listen_host = "127.0.0.1"
listen_port = 8003
backend = "noop"
device = "cpu"
output_format_default = "pcm_s16le_24000"
voices_dir = "./dev/voices"

[panel]
listen_host = "127.0.0.1"
listen_port = 8000
public_url = "http://127.0.0.1:8055"
session_lifetime_hours = 12
cors_origins = ["http://127.0.0.1:8055", "http://localhost:8055"]
access_token_minutes = 15
refresh_token_days = 7

[cluster]
node_role = "primary"
hostname = "localhost.dev"
heartbeat_interval_sec = 10
quorum_min_nodes = 1

[worker]
concurrency = 1
llm_max_response_tokens = 256

[vici]
url = "http://127.0.0.1:8010"
enabled = false
adapter = "v2_14"
session_mgr_host = "127.0.0.1"
session_mgr_port = 8010
playwright_browsers_path = "./dev/playwright-browsers"
browser_pool_size = 1
