# Local-dev infra for the aipanel backend.
#
# Spins up Postgres (with pgvector), Redis, and MinIO so you can run the
# real FastAPI backend on your laptop without bringing up Linux VMs.
# See dev/README.md for the full bring-up flow.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aipanel-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aipanel
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: aipanel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - aipanel-pgdata:/var/lib/postgresql/data
      # Migration SQL is run *only on first init* (when the data dir is
      # empty). To re-apply, `docker compose down -v` and start again.
      - ../installer/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipanel -d aipanel"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: aipanel-dev-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: aipanel-dev-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: aipaneldev
      MINIO_ROOT_PASSWORD: devpassword
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - aipanel-miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  aipanel-pgdata:
  aipanel-miniodata:
